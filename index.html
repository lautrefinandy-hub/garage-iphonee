<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Garage Andy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:15px;
}

h1{text-align:center;}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px 0;
}

.addBtn{background:#22c55e;color:white;}
.deleteBtn{background:#ef4444;color:white;}
.editBtn{background:#3b82f6;color:white;}
.statBtn{background:#f59e0b;color:white;}

.car{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

.stats{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin:15px 0;
}
</style>
</head>

<body>

<h1>🚗 Garage Andy</h1>

<input type="text" id="marque" placeholder="Marque">
<input type="text" id="modele" placeholder="Modèle">
<input type="text" id="plaque" placeholder="Plaque">
<input type="text" id="tache" placeholder="Tâche effectuée">

<button class="addBtn" onclick="addCar()">Ajouter</button>
<button class="statBtn" onclick="toggleStats()">📊 Statistiques</button>

<hr>

<input type="text" id="search" placeholder="Recherche">
<select id="filterMarque">
  <option value="">Toutes les marques</option>
</select>

<div id="cars"></div>
<div id="stats" style="display:none;"></div>

<script>

let cars = JSON.parse(localStorage.getItem("garageCars")) || [];

function save(){
  localStorage.setItem("garageCars", JSON.stringify(cars));
}

function addCar(){

  const marque=document.getElementById("marque").value.trim();
  const modele=document.getElementById("modele").value.trim();
  const plaque=document.getElementById("plaque").value.trim().toUpperCase();
  const tache=document.getElementById("tache").value.trim();

  if(!marque || !plaque || !tache){
    alert("Champs manquants");
    return;
  }

  let existing = cars.find(c => c.plaque === plaque);

  if(existing){
    existing.historique.push({
      tache:tache,
      date:Date.now()
    });
  } else {
    cars.push({
      marque,
      modele,
      plaque,
      historique:[{
        tache:tache,
        date:Date.now()
      }]
    });
  }

  save();
  clearInputs();
  displayCars();
}

function clearInputs(){
  document.getElementById("marque").value="";
  document.getElementById("modele").value="";
  document.getElementById("plaque").value="";
  document.getElementById("tache").value="";
}

function displayCars(){

  const container=document.getElementById("cars");
  container.innerHTML="";

  const search=document.getElementById("search").value.toLowerCase();
  const filter=document.getElementById("filterMarque").value.toLowerCase();

  let marquesSet=new Set();

  cars.sort((a,b)=>{
    const lastA=a.historique[a.historique.length-1].date;
    const lastB=b.historique[b.historique.length-1].date;
    return lastB-lastA;
  });

  cars.forEach((car,index)=>{

    marquesSet.add(car.marque);

    if(filter && car.marque.toLowerCase()!==filter) return;
    if(search && !(car.marque+" "+car.plaque).toLowerCase().includes(search)) return;

    let histHTML="";
    car.historique.forEach(h=>{
      histHTML+=`<p>🔧 ${h.tache} - ${new Date(h.date).toLocaleDateString()}</p>`;
    });

    const div=document.createElement("div");
    div.className="car";
    div.innerHTML=`
      <h3>${car.marque} ${car.modele||""}</h3>
      <p>🆔 ${car.plaque}</p>
      ${histHTML}
      <button class="editBtn" onclick="addTask(${index})">✏️ Ajouter tâche</button>
      <button class="deleteBtn" onclick="deleteCar(${index})">Supprimer</button>
    `;

    container.appendChild(div);
  });

  updateFilter(marquesSet);
  updateStats();
}

function updateFilter(set){
  const select=document.getElementById("filterMarque");
  const current=select.value;
  select.innerHTML='<option value="">Toutes les marques</option>';
  set.forEach(m=>{
    select.innerHTML+=`<option value="${m}">${m}</option>`;
  });
  select.value=current;
}

function addTask(index){
  const t=prompt("Nouvelle tâche :");
  if(t){
    cars[index].historique.push({
      tache:t,
      date:Date.now()
    });
    save();
    displayCars();
  }
}

function deleteCar(index){
  if(confirm("Supprimer cette voiture ?")){
    cars.splice(index,1);
    save();
    displayCars();
  }
}

function updateStats(){

  let parJour={};
  let parMois={};
  let parType={};

  cars.forEach(car=>{
    car.historique.forEach(h=>{
      const d=new Date(h.date);
      const jour=d.toLocaleDateString();
      const mois=(d.getMonth()+1)+"/"+d.getFullYear();

      parJour[jour]=(parJour[jour]||0)+1;
      parMois[mois]=(parMois[mois]||0)+1;
      parType[h.tache]=(parType[h.tache]||0)+1;
    });
  });

  let html="<div class='stats'><h3>📊 Statistiques</h3>";

  html+="<h4>Par jour</h4>";
  for(let j in parJour){
    html+=`<p>${j} : ${parJour[j]}</p>`;
  }

  html+="<h4>Par mois</h4>";
  for(let m in parMois){
    html+=`<p>${m} : ${parMois[m]}</p>`;
  }

  html+="<h4>Par type de réparation</h4>";
  for(let t in parType){
    html+=`<p>${t} : ${parType[t]}</p>`;
  }

  html+="</div>";

  document.getElementById("stats").innerHTML=html;
}

function toggleStats(){
  const s=document.getElementById("stats");
  s.style.display=s.style.display==="none"?"block":"none";
}

document.getElementById("search").addEventListener("input",displayCars);
document.getElementById("filterMarque").addEventListener("change",displayCars);

displayCars();

</script>

</body>
</html>
