<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Garage iPhone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial; margin:0; padding:10px; background:#1c1c1c; color:white;}
h2,h3{text-align:center;margin:5px;}
.tabs{display:flex;margin-bottom:10px;}
.tabBtn{flex:1;padding:12px;background:rgba(255,255,255,0.1);border:none;color:white;font-weight:bold;cursor:pointer;}
.tabBtn.active{background:rgba(255,255,255,0.25);}
.content{display:none;}
.content.active{display:block;}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:10px;border-radius:12px;margin:10px 0;}
.tacheContainer{max-height:200px;overflow-y:auto;margin:5px 0;padding:5px;border-radius:12px;background:rgba(255,255,255,0.05);}
.tacheBtn{display:block;margin:4px 0;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.1);color:white;cursor:pointer;white-space:normal;}
.tacheBtn.checked{background:#27ae60;color:black;}
button.addBtn{background:#27ae60;color:white;padding:10px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;width:100%;}
button.editBtn{background:#f39c12;color:white;padding:10px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;width:100%;}
button.deleteBtn{background:#e74c3c;color:white;padding:8px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;width:100%;}
.car{background:rgba(255,255,255,0.05);padding:10px;border-radius:12px;margin:10px 0;}
.car img{width:100%;border-radius:10px;}
canvas{margin:15px 0;border-radius:12px;background:rgba(255,255,255,0.05);padding:5px;}

/* Styles ajoutés pour la modale d'édition */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto; backdrop-filter:blur(5px); }
.modal-content { background:#2c2c2c; margin:20px auto; padding:15px; width:90%; max-width:500px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); }
.closeBtn { float:right; background:#e74c3c; color:white; border:none; border-radius:8px; padding:5px 12px; cursor:pointer; font-weight:bold; }
.history-item { background:rgba(255,255,255,0.05); padding:8px; margin:5px 0; border-radius:8px; font-size: 0.9em; border-left: 3px solid #f39c12;}
input[type="date"] { background:rgba(255,255,255,0.1); color:white; border:none; padding:10px; border-radius:8px; width:calc(100% - 20px); margin-bottom:10px; font-family:inherit; }
input[type="text"] { background:rgba(255,255,255,0.1); color:white; border:none; padding:10px; border-radius:8px; width:calc(100% - 20px); margin-bottom:5px; font-family:inherit; }
</style>
</head>
<body>

<h2>🚗 Garage iPhone</h2>

<div class="tabs">
  <button class="tabBtn active" onclick="switchTab(0)">Ajouter voiture</button>
  <button class="tabBtn" onclick="switchTab(1)">Statistiques</button>
</div>

<div class="content active" id="tabForm">
  <div class="glass">
    <input type="file" id="photo">
    <input type="text" id="marque" placeholder="Marque">
    <input type="text" id="modele" placeholder="Modèle">
    <input type="text" id="plaque" placeholder="Plaque">
    <p>✅ Tâches :</p>
    <div class="tacheContainer" id="tachesContainer"></div>
    <input type="text" id="tachesAutres" placeholder="Autres tâches séparées par des virgules">
    <button class="addBtn" onclick="addCar()">Ajouter</button>
  </div>

  <input type="text" id="searchBar" placeholder="🔎 Rechercher" oninput="displayCars()">
  <select id="filterMarque" onchange="displayCars()" style="background:rgba(255,255,255,0.1); color:white; padding:8px; border-radius:8px; border:none; width:100%; margin-bottom:10px;">
    <option value="">Filtrer par marque</option>
  </select>

  <div id="cars"></div>
</div>

<div class="content" id="tabStats">
  <h3>📊 Statistiques</h3>
  <div id="chartsContainer">
    <canvas id="chartMarques"></canvas>
    <canvas id="chartTaches"></canvas>
    <canvas id="chartMois"></canvas>
    <canvas id="chartJours"></canvas>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <button class="closeBtn" onclick="closeModal()">X</button>
    <h3 style="text-align:left; margin-top:0;">Éditer la fiche</h3>
    
    <input type="hidden" id="editIndex">
    <label><small>Marque</small></label>
    <input type="text" id="editMarque" placeholder="Marque">
    <label><small>Modèle</small></label>
    <input type="text" id="editModele" placeholder="Modèle">
    
    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">
    
    <h4>🛠 Historique des réparations</h4>
    <div id="historyContainer" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
    
    <h4>➕ Ajouter une intervention</h4>
    <input type="date" id="newDate">
    <input type="text" id="newTaches" placeholder="Nouvelles tâches (séparées par ,)">
    <button class="addBtn" style="background:#3498db;" onclick="addIntervention()">Ajouter à l'historique</button>
    
    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">
    <button class="addBtn" onclick="saveCar()">Enregistrer la fiche</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let cars = JSON.parse(localStorage.getItem("cars"))||[];
let tachesPredefinies=["Vidange et Filtre à Huile","Filtre à air","Filtre à gasoil","Plaquette de frein","Disque de frein","Filtre habitacle","Pneus Avant","Pneus Arrière"];

function switchTab(i){
  document.querySelectorAll(".tabBtn").forEach((b,idx)=>b.classList.toggle("active",idx===i));
  document.querySelectorAll(".content").forEach((c,idx)=>c.classList.toggle("active",idx===i));
  if(i===1) updateCharts();
}

function renderTaches(){
  const container=document.getElementById("tachesContainer");
  container.innerHTML="";
  tachesPredefinies.sort((a,b)=>a.localeCompare(b));
  tachesPredefinies.forEach(t=>{
    const btn=document.createElement("button");
    btn.className="tacheBtn"; btn.innerText=t; btn.dataset.value=t;
    btn.onclick=()=>btn.classList.toggle("checked");
    container.appendChild(btn);
  });
}

function addCar(){
  const file=document.getElementById("photo").files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    const photoData=file?e.target.result:"";
    const marque=document.getElementById("marque").value;
    const modele=document.getElementById("modele").value;
    const plaque=document.getElementById("plaque").value;
    const tachesCochees=Array.from(document.querySelectorAll(".tacheBtn.checked")).map(b=>b.dataset.value);
    const tachesAutres=document.getElementById("tachesAutres").value.split(",").map(t=>t.trim()).filter(t=>t);
    tachesAutres.forEach(t=>{if(t&&!tachesPredefinies.includes(t)) tachesPredefinies.push(t);});
    const taches=[...tachesCochees,...tachesAutres].join(", ");
    if(!marque||!modele){alert("Marque et modèle obligatoires!"); return;}
    
    const now = Date.now();
    // Modifié ici : On initialise le tableau des interventions
    cars.push({
        photo:photoData, marque, modele, plaque, taches, date:now, 
        interventions: [{date: now, taches: taches}]
    });
    
    localStorage.setItem("cars",JSON.stringify(cars));
    displayCars(); renderTaches();
    ["photo","marque","modele","plaque","tachesAutres"].forEach(id=>document.getElementById(id).value="");
  };
  if(file) reader.readAsDataURL(file); else reader.onload();
}

function displayCars(){
  const con=document.getElementById("cars"); con.innerHTML="";
  const f=document.getElementById("filterMarque").value.toLowerCase();
  const s=document.getElementById("searchBar").value.toLowerCase();
  cars.sort((a,b)=>b.date-a.date);
  cars.forEach((car,i)=>{
    if(f&&car.marque.toLowerCase()!==f) return;
    if(s&&!(car.marque.toLowerCase()+" "+car.plaque.toLowerCase()).includes(s)) return;
    
    // Rendu dynamique de l'historique pour la carte
    let historyHTML = "";
    if (car.interventions && car.interventions.length > 0) {
        historyHTML = car.interventions.map(int => `<p style="margin:2px 0; font-size:0.9em;">🛠 <b>${new Date(int.date).toLocaleDateString()}</b> : ${int.taches}</p>`).join('');
    } else {
        // Rétrocompatibilité pour les vieilles fiches
        historyHTML = `<p style="margin:2px 0; font-size:0.9em;">🛠 <b>${new Date(car.date).toLocaleDateString()}</b> : ${car.taches}</p>`;
    }

    const div=document.createElement("div"); div.className="car glass";
    div.innerHTML=`${car.photo?`<img src="${car.photo}">`:``}<h3>${car.marque} ${car.modele}</h3>
    <p style="margin:5px 0;">🆔 Plaque : <input type="text" value="${car.plaque}" style="width:auto; display:inline-block; padding:5px; background:rgba(0,0,0,0.2); border:none; color:white; border-radius:5px;" onchange="cars[${i}].plaque=this.value.toUpperCase(); localStorage.setItem('cars',JSON.stringify(cars)); displayCars();"></p>
    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin:10px 0;">
        ${historyHTML}
    </div>
    <button class="editBtn" onclick="openModal(${i})">✏️ Éditer / Ajouter Réparation</button>
    <button class="deleteBtn" onclick="if(confirm('Supprimer ce véhicule ?')){ cars.splice(${i},1); localStorage.setItem('cars',JSON.stringify(cars)); displayCars(); }">🗑️ Supprimer</button>`;
    con.appendChild(div);
  });
  updateFilterOptions();
}

function updateFilterOptions(){
  const sel=document.getElementById("filterMarque");
  const marques=[...new Set(cars.map(c=>c.marque))];
  sel.innerHTML='<option value="">Filtrer par marque</option>';
  marques.forEach(m=>sel.innerHTML+=`<option value="${m}">${m}</option>`);
}

// --- NOUVELLES FONCTIONS POUR L'ÉDITION ---

function openModal(index) {
    const car = cars[index];
    document.getElementById('editIndex').value = index;
    document.getElementById('editMarque').value = car.marque;
    document.getElementById('editModele').value = car.modele;
    
    // Assurer la rétrocompatibilité si "interventions" n'existe pas encore
    if (!car.interventions) {
        car.interventions = [{date: car.date, taches: car.taches}];
    }
    
    refreshHistoryUI(car);
    
    document.getElementById('newDate').valueAsDate = new Date(); // Date du jour par défaut
    document.getElementById('newTaches').value = '';
    
    document.getElementById('editModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('editModal').style.display = 'none';
}

function refreshHistoryUI(car) {
    const container = document.getElementById('historyContainer');
    container.innerHTML = car.interventions.map(int => `
        <div class="history-item">
            📅 <b>${new Date(int.date).toLocaleDateString()}</b><br>
            🔧 ${int.taches}
        </div>
    `).join('');
}

function addIntervention() {
    const index = document.getElementById('editIndex').value;
    const dateInput = document.getElementById('newDate').value;
    const tachesInput = document.getElementById('newTaches').value;
    
    if(!tachesInput) { alert("Veuillez saisir des tâches."); return; }
    
    const car = cars[index];
    const timestamp = new Date(dateInput).getTime() || Date.now();
    
    car.interventions.push({
        date: timestamp,
        taches: tachesInput
    });
    
    // On ajoute à la chaîne "taches" principale pour que tes statistiques existantes continuent de marcher !
    if(car.taches) car.taches += ", " + tachesInput;
    else car.taches = tachesInput;
    
    // Trier l'historique du plus récent au plus ancien
    car.interventions.sort((a,b) => b.date - a.date);
    
    refreshHistoryUI(car);
    document.getElementById('newTaches').value = '';
}

function saveCar() {
    const index = document.getElementById('editIndex').value;
    cars[index].marque = document.getElementById('editMarque').value;
    cars[index].modele = document.getElementById('editModele').value;
    
    localStorage.setItem("cars", JSON.stringify(cars));
    displayCars();
    closeModal();
}

// Fermer la modale si on clique en dehors
window.onclick = function(event) {
    const modal = document.getElementById('editModal');
    if (event.target == modal) closeModal();
}

// Charts
let chartMarques, chartTaches, chartMois, chartJours;
function updateCharts(){
  if(cars.length===0){
    document.getElementById("chartsContainer").innerHTML="<p style='text-align:center'>Aucune voiture ajoutée pour le moment.</p>";
    return;
  }
  const marquesData={}, tachesData={}, moisData={}, joursData={};
  cars.forEach(c=>{
    marquesData[c.marque]=(marquesData[c.marque]||0)+1;
    c.taches.split(",").forEach(t=>{const tt=t.trim(); if(tt) tachesData[tt]=(tachesData[tt]||0)+1;});
    const d=new Date(c.date);
    const mois=d.getMonth(); const jour=d.getDate();
    moisData[mois]=(moisData[mois]||0)+1;
    joursData[jour]=(joursData[jour]||0)+1;
  });
  const mLabels=Object.keys(marquesData), mCounts=Object.values(marquesData);
  const tLabels=Object.keys(tachesData), tCounts=Object.values(tachesData);
  const moisLabels=["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];
  const moisCounts=Array.from({length:12},(_,i)=>moisData[i]||0);
  const joursLabels=Array.from({length:31},(_,i)=>i+1);
  const joursCounts=joursLabels.map(d=>joursData[d]||0);

  if(chartMarques) chartMarques.destroy();
  chartMarques=new Chart(document.getElementById("chartMarques"),{type:'bar',data:{labels:mLabels,datasets:[{label:'Voitures',data:mCounts,backgroundColor:'#27ae60'}]},options:{responsive:true,plugins:{legend:{display:false}}}});
  if(chartTaches) chartTaches.destroy();
  chartTaches=new Chart(document.getElementById("chartTaches"),{type:'pie',data:{labels:tLabels,datasets:[{label:'Tâches',data:tCounts,backgroundColor:tLabels.map(()=>`#${Math.floor(Math.random()*16777215).toString(16)}`)}]},options:{responsive:true}});
  if(chartMois) chartMois.destroy();
  chartMois=new Chart(document.getElementById("chartMois"),{type:'line',data:{labels:moisLabels,datasets:[{label:'Voitures/mois',data:moisCounts,borderColor:'#3498db',backgroundColor:'#3498db22'}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}});
  if(chartJours) chartJours.destroy();
  chartJours=new Chart(document.getElementById("chartJours"),{type:'line',data:{labels:joursLabels,datasets:[{label:'Voitures/jour',data:joursCounts,borderColor:'#e67e22',backgroundColor:'#e67e2222'}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}});
}

renderTaches(); displayCars();
</script>
</body>
</html>
