<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Garage iPhone Pro v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial; margin:0; padding:10px; background:#1c1c1c; color:white;}
h2,h3{text-align:center;margin:5px;}
.tabs{display:flex;margin-bottom:15px;}
.tabBtn{flex:1;padding:12px;background:rgba(255,255,255,0.1);border:none;color:white;font-weight:bold;cursor:pointer;transition: 0.3s;}
.tabBtn.active{background:rgba(255,255,255,0.25); border-bottom: 2px solid #27ae60;}
.content{display:none;}
.content.active{display:block;}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:10px;border-radius:12px;margin:10px 0; border: 1px solid rgba(255,255,255,0.1);}
.tacheContainer{max-height:180px;overflow-y:auto;margin:5px 0;padding:5px;border-radius:12px;background:rgba(0,0,0,0.2);}
.tacheBtn{display:block;width:100%;text-align:left;margin:4px 0;padding:12px;border-radius:10px;background:rgba(255,255,255,0.1);color:white;cursor:pointer;border:none;font-size:14px;}
.tacheBtn.checked{background:#27ae60;color:white;font-weight:bold;}
button.addBtn{background:#27ae60;color:white;padding:12px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;width:100%;font-weight:bold;font-size:16px;}
button.editBtn{background:#f39c12;color:white;padding:10px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;width:100%;}
button.deleteBtn{background:#e74c3c;color:white;padding:10px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;width:100%;}
.car{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;margin:15px 0; border: 1px solid rgba(255,255,255,0.1);}
.car img{width:100%;border-radius:10px;margin-bottom:10px; object-fit: cover; max-height: 200px;}
canvas{margin:15px 0;border-radius:12px;background:rgba(255,255,255,0.05);padding:10px; width:100% !important; height:auto !important;}

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; backdrop-filter:blur(10px); }
.modal-content { background:#2c2c2c; margin:10px auto; padding:20px; width:90%; max-width:450px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); box-sizing: border-box;}
.closeBtn { float:right; background:#444; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-weight:bold;}
.history-item { background:rgba(255,255,255,0.05); padding:12px; margin:8px 0; border-radius:12px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #f39c12;}
.del-hist { background:#e74c3c; border:none; color:white; padding:6px 10px; border-radius:8px; cursor:pointer;}
input[type="text"], input[type="date"], select { width:100%; box-sizing:border-box; background:rgba(255,255,255,0.1); color:white; border:none; padding:14px; border-radius:10px; margin-bottom:10px; font-family:inherit; font-size:16px;}
</style>
</head>
<body>

<h2>🚗 Garage iPhone</h2>

<div class="tabs">
  <button class="tabBtn active" onclick="switchTab(0)">Ajouter voiture</button>
  <button class="tabBtn" onclick="switchTab(1)">Statistiques</button>
</div>

<div class="content active" id="tabForm">
  <div class="glass">
    <input type="file" id="photo" accept="image/*">
    <input type="text" id="marque" placeholder="Marque (ex: BMW)">
    <input type="text" id="modele" placeholder="Modèle (ex: Série 1)">
    <input type="text" id="plaque" placeholder="Plaque d'immatriculation">
    <p style="margin: 10px 0 5px 0;">🛠 Tâches effectuées :</p>
    <div class="tacheContainer" id="tachesContainer"></div>
    <input type="text" id="tachesAutres" placeholder="Autres (séparées par des virgules)">
    <button class="addBtn" onclick="addCar()">Enregistrer le véhicule</button>
  </div>

  <div style="margin-top:20px;">
    <input type="text" id="searchBar" placeholder="🔎 Rechercher plaque ou modèle..." oninput="displayCars()">
    <select id="filterMarque" onchange="displayCars()"><option value="">Toutes les marques</option></select>
  </div>

  <div id="cars"></div>

  <button class="deleteBtn" style="margin-top:40px; background:#444; font-size:12px; opacity:0.6;" onclick="clearDatabase()">⚠️ Effacer toute la base de données</button>
</div>

<div class="content" id="tabStats">
  <h3>📊 Analyse du Garage</h3>
  <div id="noDataMsg" style="text-align:center; padding:50px; color:#888;">Ajoutez un véhicule pour voir les stats.</div>
  <div id="chartsWrapper" style="display:none;">
    <p style="text-align:center; color:#27ae60;">Répartition par Marque</p>
    <canvas id="chartMarques"></canvas>
    <p style="text-align:center; color:#f1c40f;">Types de Travaux</p>
    <canvas id="chartTaches"></canvas>
    <p style="text-align:center; color:#3498db;">Activité Mensuelle</p>
    <canvas id="chartMois"></canvas>
    <p style="text-align:center; color:#e67e22;">Activité Quotidienne</p>
    <canvas id="chartJours"></canvas>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <button class="closeBtn" onclick="closeModal()">✕</button>
    <h3 style="margin-bottom:20px;">Modifier la fiche</h3>
    
    <input type="hidden" id="editIndex">
    <label><small>Marque</small></label>
    <input type="text" id="editMarque">
    <label><small>Modèle</small></label>
    <input type="text" id="editModele">
    
    <div style="margin-top:20px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.1);">
        <h4>⚙️ Historique des travaux</h4>
        <div id="historyContainer"></div>
        
        <div class="glass" style="margin-top:15px; background:rgba(52, 152, 219, 0.1);">
            <p style="margin:0 0 10px 0; color:#3498db; font-weight:bold;">➕ Ajouter une intervention</p>
            <input type="date" id="newDate">
            <input type="text" id="newTaches" placeholder="Description des travaux">
            <button class="addBtn" style="background:#3498db;" onclick="addIntervention()">Ajouter à l'historique</button>
        </div>
    </div>
    <button class="addBtn" style="margin-top:20px;" onclick="saveCar()">✅ Enregistrer et Fermer</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];
// Récupération des tâches apprises ou liste par défaut
let tachesPredefinies = JSON.parse(localStorage.getItem("learnedTasks")) || ["Vidange", "Filtre à Huile", "Filtre à air", "Freins", "Pneus", "Batterie", "Distribution", "Échappement"];
let myCharts = {};

// --- GESTION DES TÂCHES ---
function renderTaches() {
    const container = document.getElementById("tachesContainer");
    container.innerHTML = "";
    // Tri alphabétique pour s'y retrouver
    tachesPredefinies.sort().forEach(t => {
        const btn = document.createElement("button");
        btn.className = "tacheBtn"; btn.innerText = t; btn.dataset.value = t;
        btn.onclick = () => btn.classList.toggle("checked");
        container.appendChild(btn);
    });
}

function learnNewTasks(str) {
    if (!str) return;
    const items = str.split(",").map(t => t.trim()).filter(t => t !== "");
    let changed = false;
    items.forEach(item => {
        // On vérifie si la tâche existe déjà (insensible à la casse)
        const exists = tachesPredefinies.some(t => t.toLowerCase() === item.toLowerCase());
        if (!exists) {
            tachesPredefinies.push(item);
            changed = true;
        }
    });
    if (changed) {
        localStorage.setItem("learnedTasks", JSON.stringify(tachesPredefinies));
        renderTaches();
    }
}

function switchTab(i) {
    document.querySelectorAll(".tabBtn").forEach((b, idx) => b.classList.toggle("active", idx === i));
    document.querySelectorAll(".content").forEach((c, idx) => c.classList.toggle("active", idx === i));
    if (i === 1) updateCharts();
}

// --- GESTION DES DONNÉES ---
function addCar() {
    const file = document.getElementById("photo").files[0];
    const marque = document.getElementById("marque").value.trim();
    const modele = document.getElementById("modele").value.trim();
    const plaque = document.getElementById("plaque").value.toUpperCase().trim();
    
    if (!marque || !modele) { alert("Marque et Modèle requis"); return; }

    const reader = new FileReader();
    reader.onload = function(e) {
        const photoData = file ? e.target.result : "";
        const tachesCochees = Array.from(document.querySelectorAll(".tacheBtn.checked")).map(b => b.dataset.value);
        const tachesAutresStr = document.getElementById("tachesAutres").value;
        
        // Apprentissage des nouvelles tâches saisies
        learnNewTasks(tachesAutresStr);
        
        const tachesAutres = tachesAutresStr.split(",").map(t => t.trim()).filter(t => t);
        const totalTaches = [...tachesCochees, ...tachesAutres].join(", ");
        
        const now = Date.now();
        cars.push({
            photo: photoData, marque, modele, plaque,
            taches: totalTaches, date: now,
            interventions: [{ date: now, taches: totalTaches }]
        });
        
        saveAndRefresh();
        resetForm();
    };
    if (file) reader.readAsDataURL(file); else reader.onload();
}

function saveAndRefresh() {
    localStorage.setItem("cars", JSON.stringify(cars));
    displayCars();
    updateCharts();
}

function resetForm() {
    ["photo", "marque", "modele", "plaque", "tachesAutres"].forEach(id => document.getElementById(id).value = "");
    document.querySelectorAll(".tacheBtn.checked").forEach(b => b.classList.remove("checked"));
}

function clearDatabase() {
    if(confirm("Voulez-vous vraiment supprimer TOUS les véhicules du garage ? Cette action est irréversible.")){
        cars = [];
        saveAndRefresh();
    }
}

// --- AFFICHAGE LISTE ---
function displayCars() {
    const con = document.getElementById("cars"); con.innerHTML = "";
    const f = document.getElementById("filterMarque").value.toLowerCase();
    const s = document.getElementById("searchBar").value.toLowerCase();
    
    cars.sort((a, b) => b.date - a.date).forEach((car, i) => {
        if (f && car.marque.toLowerCase() !== f) return;
        if (s && !(car.marque + " " + car.plaque + " " + car.modele).toLowerCase().includes(s)) return;
        
        const div = document.createElement("div"); div.className = "car glass";
        div.innerHTML = `
            ${car.photo ? `<img src="${car.photo}">` : ``}
            <h3 style="margin:0;">${car.marque} ${car.modele}</h3>
            <p style="margin:10px 0;">🆔 Plaque : <b style="color:#27ae60">${car.plaque || 'Non renseignée'}</b></p>
            <button class="editBtn" onclick="openModal(${i})">✏️ Gérer les réparations</button>
            <button class="deleteBtn" style="background:rgba(231, 76, 60, 0.2); color:#e74c3c; border:1px solid #e74c3c;" onclick="if(confirm('Supprimer cette fiche ?')){cars.splice(${i},1); saveAndRefresh();}">🗑️ Supprimer</button>
        `;
        con.appendChild(div);
    });
    updateFilterOptions();
}

function updateFilterOptions() {
    const sel = document.getElementById("filterMarque");
    const current = sel.value;
    const marques = [...new Set(cars.map(c => c.marque))];
    sel.innerHTML = '<option value="">Toutes les marques</option>';
    marques.forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);
    sel.value = current;
}

// --- MODALE ÉDITION ---
function openModal(i) {
    const car = cars[i];
    if (!car.interventions) car.interventions = [{ date: car.date, taches: car.taches }];
    
    document.getElementById('editIndex').value = i;
    document.getElementById('editMarque').value = car.marque;
    document.getElementById('editModele').value = car.modele;
    document.getElementById('newDate').valueAsDate = new Date();
    document.getElementById('newTaches').value = "";
    refreshHistoryUI(car);
    document.getElementById('editModal').style.display = 'block';
}

function closeModal() { document.getElementById('editModal').style.display = 'none'; }

function refreshHistoryUI(car) {
    const container = document.getElementById('historyContainer');
    container.innerHTML = car.interventions.map((int, idx) => `
        <div class="history-item">
            <div>
                📅 <b>${new Date(int.date).toLocaleDateString()}</b><br>
                <span style="font-size:0.85em; color:#ddd;">🔧 ${int.taches}</span>
            </div>
            <button class="del-hist" onclick="deleteHistoryItem(${idx})">🗑️</button>
        </div>
    `).join('');
}

function deleteHistoryItem(idx) {
    const carIdx = document.getElementById('editIndex').value;
    if(confirm("Supprimer cette intervention de l'historique ?")) {
        cars[carIdx].interventions.splice(idx, 1);
        refreshHistoryUI(cars[carIdx]);
    }
}

function addIntervention() {
    const i = document.getElementById('editIndex').value;
    const dateVal = document.getElementById('newDate').value;
    const tacheVal = document.getElementById('newTaches').value.trim();
    if (!tacheVal) return;
    
    // Apprentissage de la tâche saisie dans l'historique
    learnNewTasks(tacheVal);
    
    cars[i].interventions.push({
        date: new Date(dateVal).getTime(),
        taches: tacheVal
    });
    cars[i].interventions.sort((a,b) => b.date - a.date);
    refreshHistoryUI(cars[i]);
    document.getElementById('newTaches').value = "";
}

function saveCar() {
    const i = document.getElementById('editIndex').value;
    cars[i].marque = document.getElementById('editMarque').value;
    cars[i].modele = document.getElementById('editModele').value;
    cars[i].taches = cars[i].interventions.map(int => int.taches).join(', ');
    saveAndRefresh();
    closeModal();
}

// --- STATISTIQUES (VALEUR MIN 0 FORCÉE) ---
function updateCharts() {
    const wrapper = document.getElementById("chartsWrapper");
    const msg = document.getElementById("noDataMsg");

    if (cars.length === 0) {
        wrapper.style.display = "none";
        msg.style.display = "block";
        return;
    }
    
    wrapper.style.display = "block";
    msg.style.display = "none";
    
    const stats = { marques: {}, taches: {}, mois: Array(12).fill(0), jours: Array(31).fill(0) };
    
    cars.forEach(c => {
        stats.marques[c.marque] = (stats.marques[c.marque] || 0) + 1;
        (c.interventions || []).forEach(inter => {
            inter.taches.split(",").forEach(t => { 
                const tt = t.trim(); 
                if (tt) stats.taches[tt] = (stats.taches[tt] || 0) + 1; 
            });
            const d = new Date(inter.date);
            stats.mois[d.getMonth()]++;
            stats.jours[d.getDate() - 1]++;
        });
    });

    const draw = (id, type, label, labels, data, colors) => {
        if (myCharts[id]) myCharts[id].destroy();
        myCharts[id] = new Chart(document.getElementById(id), {
            type: type,
            data: { 
                labels: labels, 
                datasets: [{ label: label, data: data, backgroundColor: colors, borderColor: colors, tension: 0.3 }] 
            },
            options: { 
                responsive: true,
                plugins: { legend: { display: type === 'pie', labels: { color: 'white' } } },
                scales: type !== 'pie' ? { 
                    y: { 
                        beginAtZero: true, // FORCE LA VALEUR MINIMALE À 0
                        ticks: { color: 'white', stepSize: 1 }, 
                        grid: { color: 'rgba(255,255,255,0.1)' } 
                    }, 
                    x: { ticks: { color: 'white' } } 
                } : {}
            }
        });
    };

    draw('chartMarques', 'bar', 'Véhicules', Object.keys(stats.marques), Object.values(stats.marques), '#27ae60');
    draw('chartTaches', 'pie', 'Réparations', Object.keys(stats.taches), Object.values(stats.taches), Object.keys(stats.taches).map((_,i) => `hsla(${i*45}, 70%, 50%, 0.8)`));
    draw('chartMois', 'line', 'Interventions', ["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"], stats.mois, '#3498db');
    draw('chartJours', 'line', 'Activité', Array.from({length:31},(_,i)=>i+1), stats.jours, '#e67e22');
}

window.onclick = (e) => { if (e.target == document.getElementById('editModal')) closeModal(); };

renderTaches();
displayCars();
</script>
</body>
</html>
