<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Garage Andy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:15px;
}

h1{text-align:center;}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px 0;
}

.addBtn{background:#22c55e;color:white;}
.deleteBtn{background:#ef4444;color:white;}
.editBtn{background:#3b82f6;color:white;}
.statBtn{background:#f59e0b;color:white;}

.car{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

/* SLIDE MENU */
#taskMenu{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#1e293b;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
  max-height:70%;
  overflow-y:auto;
}

#taskMenu.active{
  bottom:0;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

.overlay.active{display:block;}

.tab{
  display:none;
}

.tab.active{
  display:block;
}
</style>
</head>

<body>

<h1>🚗 Garage Andy</h1>

<div id="mainTab" class="tab active">

<input type="text" id="marque" placeholder="Marque">
<input type="text" id="modele" placeholder="Modèle">
<input type="text" id="plaque" placeholder="Plaque">

<button class="addBtn" onclick="openTaskMenu()">Choisir tâches</button>
<button class="statBtn" onclick="showStats()">📊 Statistiques</button>

<hr>

<input type="text" id="search" placeholder="Recherche">
<select id="filterMarque">
  <option value="">Toutes les marques</option>
</select>

<div id="cars"></div>

</div>

<div id="statsTab" class="tab">
  <button onclick="showMain()">⬅ Retour</button>
  <div id="stats"></div>
</div>

<div class="overlay" id="overlay" onclick="closeTaskMenu()"></div>

<div id="taskMenu">
  <h3>Tâches</h3>

  <div id="taskList"></div>

  <input type="text" id="customTask" placeholder="Autre tâche">
  <button onclick="addSelectedTasks()" class="addBtn">Valider</button>
</div>

<script>

let cars = JSON.parse(localStorage.getItem("garageCars")) || [];

const predefinedTasks = [
  "Vidange",
  "Freins",
  "Distribution",
  "Embrayage",
  "Pneus",
  "Révision",
  "Diagnostic",
  "Batterie"
];

function save(){
  localStorage.setItem("garageCars", JSON.stringify(cars));
}

/* ---------- SLIDE MENU ---------- */

function openTaskMenu(){
  const list=document.getElementById("taskList");
  list.innerHTML="";
  predefinedTasks.forEach((t,i)=>{
    list.innerHTML+=`
      <label>
        <input type="checkbox" value="${t}"> ${t}
      </label><br>
    `;
  });
  document.getElementById("taskMenu").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeTaskMenu(){
  document.getElementById("taskMenu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function addSelectedTasks(){

  const marque=document.getElementById("marque").value.trim();
  const modele=document.getElementById("modele").value.trim();
  const plaque=document.getElementById("plaque").value.trim().toUpperCase();

  if(!marque || !plaque){
    alert("Champs manquants");
    return;
  }

  let tasks=[];
  document.querySelectorAll("#taskList input:checked").forEach(cb=>{
    tasks.push(cb.value);
  });

  const custom=document.getElementById("customTask").value.trim();
  if(custom) tasks.push(custom);

  if(tasks.length===0){
    alert("Aucune tâche sélectionnée");
    return;
  }

  let existing=cars.find(c=>c.plaque===plaque);

  if(existing){
    tasks.forEach(t=>{
      existing.historique.push({tache:t,date:Date.now()});
    });
  } else {
    cars.push({
      marque,
      modele,
      plaque,
      historique:tasks.map(t=>({tache:t,date:Date.now()}))
    });
  }

  save();
  closeTaskMenu();
  clearInputs();
  displayCars();
}

function clearInputs(){
  document.getElementById("marque").value="";
  document.getElementById("modele").value="";
  document.getElementById("plaque").value="";
  document.getElementById("customTask").value="";
}

/* ---------- DISPLAY ---------- */

function displayCars(){

  const container=document.getElementById("cars");
  container.innerHTML="";

  const search=document.getElementById("search").value.toLowerCase();
  const filter=document.getElementById("filterMarque").value.toLowerCase();

  let marquesSet=new Set();

  cars.forEach((car,index)=>{

    marquesSet.add(car.marque);

    if(filter && car.marque.toLowerCase()!==filter) return;
    if(search && !(car.marque+" "+car.plaque).toLowerCase().includes(search)) return;

    let histHTML="";
    car.historique.forEach(h=>{
      histHTML+=`<p>🔧 ${h.tache} - ${new Date(h.date).toLocaleDateString()}</p>`;
    });

    const div=document.createElement("div");
    div.className="car";
    div.innerHTML=`
      <h3>${car.marque} ${car.modele||""}</h3>
      <p>🆔 ${car.plaque}</p>
      ${histHTML}
      <button class="editBtn" onclick="addExtraTask(${index})">✏️ Ajouter tâche</button>
      <button class="deleteBtn" onclick="deleteCar(${index})">Supprimer</button>
    `;

    container.appendChild(div);
  });

  updateFilter(marquesSet);
}

function updateFilter(set){
  const select=document.getElementById("filterMarque");
  const current=select.value;
  select.innerHTML='<option value="">Toutes les marques</option>';
  set.forEach(m=>{
    select.innerHTML+=`<option value="${m}">${m}</option>`;
  });
  select.value=current;
}

function addExtraTask(index){
  openTaskMenu();
  document.querySelector(".addBtn").onclick=function(){
    let tasks=[];
    document.querySelectorAll("#taskList input:checked").forEach(cb=>{
      tasks.push(cb.value);
    });
    const custom=document.getElementById("customTask").value.trim();
    if(custom) tasks.push(custom);

    tasks.forEach(t=>{
      cars[index].historique.push({tache:t,date:Date.now()});
    });

    save();
    closeTaskMenu();
    displayCars();
  };
}

function deleteCar(index){
  if(confirm("Supprimer ?")){
    cars.splice(index,1);
    save();
    displayCars();
  }
}

/* ---------- STATS TAB ---------- */

function showStats(){
  document.getElementById("mainTab").classList.remove("active");
  document.getElementById("statsTab").classList.add("active");
  updateStats();
}

function showMain(){
  document.getElementById("statsTab").classList.remove("active");
  document.getElementById("mainTab").classList.add("active");
}

function updateStats(){

  let parJour={};
  let parMois={};
  let parType={};

  cars.forEach(car=>{
    car.historique.forEach(h=>{
      const d=new Date(h.date);
      const jour=d.toLocaleDateString();
      const mois=(d.getMonth()+1)+"/"+d.getFullYear();

      parJour[jour]=(parJour[jour]||0)+1;
      parMois[mois]=(parMois[mois]||0)+1;
      parType[h.tache]=(parType[h.tache]||0)+1;
    });
  });

  let html="<h3>📊 Statistiques</h3>";

  html+="<h4>Par jour</h4>";
  for(let j in parJour) html+=`<p>${j} : ${parJour[j]}</p>`;

  html+="<h4>Par mois</h4>";
  for(let m in parMois) html+=`<p>${m} : ${parMois[m]}</p>`;

  html+="<h4>Par type</h4>";
  for(let t in parType) html+=`<p>${t} : ${parType[t]}</p>`;

  document.getElementById("stats").innerHTML=html;
}

document.getElementById("search").addEventListener("input",displayCars);
document.getElementById("filterMarque").addEventListener("change",displayCars);

displayCars();

</script>

</body>
</html>
